<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/mundial-2026/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0A0E1A" />
    <meta
      name="description"
      content="Las eliminatorias del Mundial 2026 en vivo: el camino a la final, marcadores en tiempo real y las selecciones que siguen con vida."
    />
    <meta property="og:title" content="Fix26 · Mundial 2026 en vivo" />
    <meta
      property="og:description"
      content="El camino a la final del Mundial 2026: cuadro en vivo, marcadores y selecciones."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://damelm.github.io/mundial-2026/og-image.jpg" />
    <title>Fix26 · Mundial 2026 en vivo</title>
    <link
      rel="preload"
      href="/mundial-2026/fonts/anton.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/mundial-2026/fonts/hanken.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <!-- Shell estático: pinta al instante mientras carga React (mismo layout,
         mismas fuentes) para que el primer render no espere al bundle. -->
    <div id="root">
      <div style="max-width:560px;margin:0 auto;min-height:100dvh">
        <header
          style="display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top) + 14px) 16px 4px"
        >
          <div style="display:flex;align-items:baseline;gap:8px">
            <span
              style="font-family:'Anton','Arial Narrow',system-ui,sans-serif;font-size:26px;line-height:1;letter-spacing:-0.02em;color:#e7b84b"
              >FIX26</span
            >
            <span
              style="font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.18em;color:#8a96b0"
              >Eliminatorias</span
            >
          </div>
          <span
            style="border:1px solid #1d2740;border-radius:999px;padding:4px 10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#4fd1e0"
            >Mundial 2026</span
          >
        </header>
        <div style="padding:4px 16px 0">
          <p
            style="margin:0;font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.28em;color:#4fd1e0"
          >
            En vivo
          </p>
          <h1
            style="margin:4px 0 0;font-family:'Anton','Arial Narrow',system-ui,sans-serif;font-size:34px;line-height:1;font-weight:400;color:#eaf0ff"
          >
            AHORA
          </h1>
          <p
            style="margin:8px 0 0;max-width:352px;font-size:13.5px;line-height:1.5;color:#8a96b0"
          >
            Marcadores en tiempo real, el cuadro que se enciende con cada
            ganador y las selecciones que siguen con vida, camino a la final
            del 19 de julio en Nueva York.
          </p>
          <p
            style="margin:24px 0 0;font-family:'JetBrains Mono',monospace;font-size:12px;color:#8a96b0"
          >
            Cargando eliminatorias…
          </p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
