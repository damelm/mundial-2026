<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#0a0c11" id="meta-theme" />
  <meta name="description" content="Fix26: el fixture del Mundial 2026 en vivo. Todos los partidos en tu hora local, tu selección y los goles al instante." />
  <script>try{var d=localStorage.getItem('wc26-dark');document.documentElement.dataset.theme=((d==null?'1':d)==='1')?'dark':'light';}catch(e){document.documentElement.dataset.theme='dark';}</script>
  <title>Fix26 · Fixture del Mundial 2026</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://flagcdn.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=estadio9" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Fix26" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Open Graph / compartir -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Fix26 · Fixture del Mundial 2026" />
  <meta property="og:description" content="Todos los partidos del Mundial 2026 en vivo, en tu hora local y tu idioma, con los colores de tu selección." />
  <meta property="og:url" content="https://damelm.github.io/mundial-2026/" />
  <meta property="og:image" content="https://damelm.github.io/mundial-2026/og-image.jpg" />
  <meta property="og:locale" content="es_LA" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Fix26 · Fixture del Mundial 2026" />
  <meta name="twitter:description" content="El Mundial 2026 en vivo, en tu hora local y tu idioma." />
  <meta name="twitter:image" content="https://damelm.github.io/mundial-2026/og-image.jpg" />
</head>
<body>
  <!-- ===================== HERO ======================================= -->
  <header class="hero" id="hero">
    <div class="hero-watermark" id="hero-watermark" aria-hidden="true">26</div>
    <div class="hero-top">
      <div class="wordmark" aria-label="Fix26">
        <span class="wm-top">Fix</span>
        <span class="wm-26">26</span>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="dark-btn" aria-label="Tema claro/oscuro" title="Tema claro/oscuro">
          <svg class="ic-moon" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path fill="currentColor" d="M12.1 22c-5.5 0-10-4.5-10-10 0-5 3.7-9.2 8.6-9.9.4-.1.8.1 1 .5.2.4.1.8-.2 1.1A7.98 7.98 0 0 0 9.1 9c0 4.4 3.6 8 8 8 1.9 0 3.7-.7 5.1-1.9.3-.3.8-.3 1.1-.1.4.2.6.6.5 1A10.04 10.04 0 0 1 12.1 22z" transform="scale(.92) translate(1 1)"/></svg>
          <svg class="ic-sun" viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path fill="currentColor" d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0-5l1.5 3h-3L12 2zm0 20l-1.5-3h3L12 22zM2 12l3-1.5v3L2 12zm20 0l-3 1.5v-3L22 12zM4.9 4.9l3.2 1.1-2.1 2.1L4.9 4.9zm14.2 14.2l-3.2-1.1 2.1-2.1 1.1 3.2zM19.1 4.9L18 8.1l-2.1-2.1 3.2-1.1zM4.9 19.1l1.1-3.2 2.1 2.1-3.2 1.1z"/></svg>
        </button>
        <button class="icon-btn" id="share-btn" aria-label="Compartir" title="Compartir">
          <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.93-2.92z"/></svg>
        </button>
        <button class="icon-btn" id="open-lang" aria-label="Idioma" title="Idioma"><span id="lang-current">ES</span></button>
        <button class="country-btn" id="open-selector" aria-haspopup="dialog">
          <img class="fl" id="country-btn-flag" alt="" />
          <span class="country-btn-text" id="country-btn-text">Elegir país</span>
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
        </button>
      </div>
    </div>

    <div class="hero-main">
      <p class="hero-kicker" id="hero-confed">FIFA · USA · Canadá · México</p>
      <h1 class="hero-title" id="hero-title">Mundial 2026</h1>
      <p class="hero-nick" id="hero-nick"></p>
      <p class="hero-titles" id="hero-titles"></p>
    </div>

    <div class="hero-rule" aria-hidden="true"></div>

    <div class="fact-card" id="fact-card">
      <span class="fact-label" id="fact-label">¿Sabías que…?</span>
      <p class="fact-text" id="fact-text">…</p>
    </div>

    <div class="countdown" id="countdown" hidden>
      <span class="countdown-label" id="countdown-label"></span>
      <div class="countdown-teams" id="countdown-teams"></div>
      <div class="cd-clock" id="cd-clock"></div>
      <div class="cd-pred" id="cd-pred" hidden></div>
    </div>
  </header>

  <!-- Cinta de eventos EN VIVO (aparece solo cuando hay partidos jugándose) -->
  <div class="live-ticker" id="live-ticker" hidden aria-label="Eventos en vivo"></div>

  <!-- ===================== TABS ======================================= -->
  <div class="tabs-wrap" id="tabs-wrap">
    <nav class="tabs" id="tabs">
      <button class="tab is-active" data-tab="fixture" id="tab-fixture">Fixture</button>
      <button class="tab" data-tab="grupos" id="tab-grupos">Grupos</button>
      <button class="tab" data-tab="bracket" id="tab-bracket">Eliminatorias</button>
      <button class="tab" data-tab="seleccion" id="tab-seleccion">Mi selección</button>
      <button class="tab" data-tab="sedes" id="tab-sedes">Sedes</button>
    </nav>
  </div>

  <main id="main">
    <div id="status" class="status"></div>

    <section class="panel is-active" id="panel-fixture" data-panel="fixture">
      <div class="panel-controls">
        <div class="seg" id="fixture-filters" role="tablist">
          <button class="seg-btn is-active" data-filter="all" id="fchip-all">Todos</button>
          <button class="seg-btn" data-filter="today" id="fchip-today">Hoy</button>
          <button class="seg-btn" data-filter="live" id="fchip-live">En vivo</button>
        </div>
        <button class="ghost-btn" id="toggle-all" type="button"><span id="toggle-all-text">Expandir todo</span></button>
      </div>
      <p class="tz-hint" id="tz-hint"></p>
      <div id="fixture-list" class="fixture-list"></div>
    </section>

    <section class="panel" id="panel-grupos" data-panel="grupos">
      <div id="grupos-list" class="grupos-grid"></div>
    </section>

    <section class="panel" id="panel-bracket" data-panel="bracket">
      <div id="bracket-content"></div>
    </section>

    <section class="panel" id="panel-seleccion" data-panel="seleccion">
      <div id="seleccion-content"></div>
    </section>

    <section class="panel" id="panel-sedes" data-panel="sedes">
      <div id="sedes-content"></div>
    </section>
  </main>

  <footer class="footer">
    <p id="footer-updated">—</p>
    <p id="footer-made">Datos abiertos: <a href="https://github.com/openfootball" target="_blank" rel="noopener">openfootball</a> · <a href="https://www.thesportsdb.com" target="_blank" rel="noopener">TheSportsDB</a> · <a href="https://github.com/martj42/international_results" target="_blank" rel="noopener">martj42</a></p>
    <p><a href="https://github.com/damelm/mundial-2026" target="_blank" rel="noopener">GitHub</a></p>
    <p><button class="footer-install" id="footer-install" type="button" hidden>Instalar app</button></p>
    <p>© 2026 damelm · Todos los derechos reservados</p>
    <p id="footer-build" class="footer-build"></p>
  </footer>

  <!-- Aviso de instalación (PWA). Se renderiza por JS; aparece solo si NO está instalada. -->
  <div class="install-card" id="install-card" hidden></div>

  <!-- ===================== MODAL SELECTOR ============================= -->
  <div class="modal" id="selector" role="dialog" aria-modal="true" aria-labelledby="selector-title" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet">
      <div class="modal-head">
        <h2 id="selector-title">Elegí tu selección</h2>
        <button class="modal-close" data-close aria-label="Cerrar">✕</button>
      </div>
      <div class="lang-row" id="lang-row"></div>
      <input type="search" id="country-search" class="country-search" placeholder="Buscar país…" autocomplete="off" />
      <button class="country-item neutral-item" data-team="">
        <span class="ci-flag emoji"><svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M19 5h-2V3H7v2H5a2 2 0 0 0-2 2v2c0 2.6 1.9 4.7 4.4 5 .6 1.5 1.9 2.6 3.6 2.9V19H8v2h8v-2h-3v-2.1c1.7-.3 3-1.4 3.6-2.9 2.5-.3 4.4-2.4 4.4-5V7a2 2 0 0 0-2-2zM5 9V7h2v4.8C5.8 11.4 5 10.3 5 9zm14 0c0 1.3-.8 2.4-2 2.8V7h2v2z"/></svg></span>
        <span class="ci-name" id="neutral-name">Modo neutral (Mundial)</span>
      </button>
      <div class="country-grid" id="country-grid"></div>
    </div>
  </div>

  <div class="modal" id="match-modal" role="dialog" aria-modal="true" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet mm-sheet" id="match-modal-body"></div>
  </div>

  <script src="i18n.js"></script>
  <script src="i18n-content.js"></script>
  <script src="themes.js"></script>
  <script src="data/bracket-map.js"></script>
  <script src="data/team-ids.js"></script>
  <script src="data/stadiums.js"></script>
  <script src="content.js"></script>
  <script src="ads.js"></script>
  <script src="app.js?v=estadio9"></script>
  <script>
    if ("serviceWorker" in navigator) {
      // Si ya había un SW controlando la página, al activarse uno nuevo recargamos
      // UNA vez para tomar la versión nueva (no recarga en la primera visita).
      if (navigator.serviceWorker.controller) {
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return; refreshing = true; location.reload();
        });
      }
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }).then((reg) => {
          reg.update().catch(() => {}); // chequear actualización YA, no solo al volver a la pestaña
          // Busca actualizaciones del SW al volver a la pestaña.
          reg.addEventListener("updatefound", () => {
            const sw = reg.installing;
            if (sw) sw.addEventListener("statechange", () => {
              if (sw.state === "installed" && navigator.serviceWorker.controller) sw.postMessage?.("skip-waiting");
            });
          });
          document.addEventListener("visibilitychange", () => { if (!document.hidden) reg.update().catch(() => {}); });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
