<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05060c" id="meta-theme" />
  <meta name="description" content="Fixture del Mundial 2026 en tiempo real, temático según tu país. 104 partidos, grupos, posiciones y eliminatorias." />
  <title>Mundial 2026 · Fixture en vivo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://flagcdn.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Hanken+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Mundial 2026" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Open Graph / compartir -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mundial 2026 · Fixture en vivo" />
  <meta property="og:description" content="El fixture completo del Mundial 2026, en vivo y temático según tu país. 104 partidos, grupos, posiciones y eliminatorias." />
  <meta property="og:url" content="https://damelm.github.io/mundial-2026/" />
  <meta property="og:image" content="https://damelm.github.io/mundial-2026/og-image.png" />
  <meta property="og:locale" content="es_LA" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mundial 2026 · Fixture en vivo" />
  <meta name="twitter:description" content="El fixture completo del Mundial 2026, en vivo y temático según tu país." />
  <meta name="twitter:image" content="https://damelm.github.io/mundial-2026/og-image.png" />
</head>
<body>
  <!-- ===================== HERO ======================================= -->
  <header class="hero" id="hero">
    <div class="hero-watermark" id="hero-watermark" aria-hidden="true">26</div>
    <div class="hero-top">
      <div class="hero-badge" id="hero-badge"><img id="hero-flag-img" alt="" /></div>
      <div class="top-actions">
        <button class="icon-btn" id="share-btn" aria-label="Compartir" title="Compartir">
          <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.93-2.92z"/></svg>
        </button>
        <button class="icon-btn" id="open-lang" aria-label="Idioma" title="Idioma"><span id="lang-current">ES</span></button>
        <button class="country-btn" id="open-selector" aria-haspopup="dialog">
          <img class="fl" id="country-btn-flag" alt="" />
          <span class="country-btn-text" id="country-btn-text">Elegir país</span>
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
        </button>
      </div>
    </div>

    <div class="hero-main">
      <p class="hero-kicker" id="hero-confed">FIFA · USA · Canadá · México</p>
      <h1 class="hero-title" id="hero-title">Mundial 2026</h1>
      <p class="hero-nick" id="hero-nick"></p>
      <p class="hero-titles" id="hero-titles"></p>
    </div>

    <div class="hero-rule" aria-hidden="true"></div>

    <div class="fact-card" id="fact-card">
      <span class="fact-label" id="fact-label">¿Sabías que…?</span>
      <p class="fact-text" id="fact-text">…</p>
    </div>

    <div class="countdown" id="countdown" hidden>
      <span class="countdown-label" id="countdown-label"></span>
      <div class="countdown-teams" id="countdown-teams"></div>
      <div class="cd-clock" id="cd-clock"></div>
    </div>
  </header>

  <!-- ===================== TABS ======================================= -->
  <nav class="tabs" id="tabs">
    <button class="tab is-active" data-tab="fixture" id="tab-fixture">Fixture</button>
    <button class="tab" data-tab="grupos" id="tab-grupos">Grupos</button>
    <button class="tab" data-tab="bracket" id="tab-bracket">Eliminatorias</button>
    <button class="tab" data-tab="seleccion" id="tab-seleccion">Mi selección</button>
    <button class="tab" data-tab="sedes" id="tab-sedes">Sedes</button>
  </nav>

  <main id="main">
    <div id="status" class="status"></div>

    <section class="panel is-active" id="panel-fixture" data-panel="fixture">
      <div class="panel-controls">
        <button class="ghost-btn" id="toggle-all" type="button"><span id="toggle-all-text">Expandir todo</span></button>
        <label class="switch" id="only-mine-wrap" hidden>
          <input type="checkbox" id="only-mine" />
          <span class="switch-track"><span class="switch-thumb"></span></span>
          <span class="switch-text" id="only-mine-text"></span>
        </label>
      </div>
      <p class="tz-hint" id="tz-hint"></p>
      <div id="fixture-list" class="fixture-list"></div>
    </section>

    <section class="panel" id="panel-grupos" data-panel="grupos">
      <div id="grupos-list" class="grupos-grid"></div>
    </section>

    <section class="panel" id="panel-bracket" data-panel="bracket">
      <div id="bracket-content"></div>
    </section>

    <section class="panel" id="panel-seleccion" data-panel="seleccion">
      <div id="seleccion-content"></div>
    </section>

    <section class="panel" id="panel-sedes" data-panel="sedes">
      <div id="sedes-content"></div>
    </section>
  </main>

  <footer class="footer">
    <p id="footer-updated">—</p>
    <p id="footer-made">Datos: <a href="https://www.thesportsdb.com" target="_blank" rel="noopener">TheSportsDB</a></p>
    <p><a href="https://github.com/damelm/mundial-2026" target="_blank" rel="noopener">GitHub</a></p>
  </footer>

  <!-- ===================== MODAL SELECTOR ============================= -->
  <div class="modal" id="selector" role="dialog" aria-modal="true" aria-labelledby="selector-title" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-sheet">
      <div class="modal-head">
        <h2 id="selector-title">Elegí tu selección</h2>
        <button class="modal-close" data-close aria-label="Cerrar">✕</button>
      </div>
      <div class="lang-row" id="lang-row"></div>
      <input type="search" id="country-search" class="country-search" placeholder="Buscar país…" autocomplete="off" />
      <button class="country-item neutral-item" data-team="">
        <span class="ci-flag emoji">🏆</span>
        <span class="ci-name" id="neutral-name">Modo neutral (Mundial)</span>
      </button>
      <div class="country-grid" id="country-grid"></div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="i18n-content.js"></script>
  <script src="themes.js"></script>
  <script src="data/bracket-map.js"></script>
  <script src="data/team-ids.js"></script>
  <script src="data/stadiums.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      // Si ya había un SW controlando la página, al activarse uno nuevo recargamos
      // UNA vez para tomar la versión nueva (no recarga en la primera visita).
      if (navigator.serviceWorker.controller) {
        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (refreshing) return; refreshing = true; location.reload();
        });
      }
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then((reg) => {
          // Busca actualizaciones del SW al volver a la pestaña.
          reg.addEventListener("updatefound", () => {
            const sw = reg.installing;
            if (sw) sw.addEventListener("statechange", () => {
              if (sw.state === "installed" && navigator.serviceWorker.controller) sw.postMessage?.("skip-waiting");
            });
          });
          document.addEventListener("visibilitychange", () => { if (!document.hidden) reg.update().catch(() => {}); });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
