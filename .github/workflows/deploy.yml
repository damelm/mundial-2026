name: Deploy a GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (con prerender y CSS inline)
        run: npm run build:site

      - name: Forzar Pages a modo "GitHub Actions"
        # El sitio quedó en modo legacy ("deploy from branch"): cada push
        # publica también el root crudo y pisa el artefacto (carrera).
        # Este PUT cambia el build_type; si el token no alcanza, solo avisa
        # (queda el paso manual en Settings → Pages → Source).
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request('PUT /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                build_type: 'workflow',
              });
              core.info('Pages en modo workflow ✔');
            } catch (e) {
              core.warning('No se pudo cambiar build_type: ' + e.message);
            }

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Activa Pages si no existiera aún.
          enablement: true

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
